schema_version: "1.0"

extension:
  id: contextforge-mcp
  name: ContextForge MCP
  version: 0.1.0
  description: >
    Integrates codebase-memory-mcp (code knowledge graph) + headroom (context
    compression) into the Spec Kit SDD workflow. Adds 4 slash commands that
    replace file-by-file exploration with graph queries — reducing token usage
    by 90%+ during the implement phase.
  author: capatinore
  license: MIT
  category: code
  effect: read-write
  repository: https://github.com/capatinore/contextforge-mcp
  homepage: https://github.com/capatinore/contextforge-mcp
  documentation: https://github.com/capatinore/contextforge-mcp/blob/main/README.md

requires:
  speckit_version: ">=0.10.0"

commands:
  - name: cf-index
    description: Index the codebase into the ContextForge knowledge graph before implementing
    file: commands/cf-index.md

  - name: cf-analyze
    description: Analyze codebase structure and compress spec context before planning
    file: commands/cf-analyze.md

  - name: cf-implement
    description: Graph-aware implement command — uses CBM graph queries instead of file reads
    file: commands/cf-implement.md

  - name: cf-stats
    description: Show ContextForge token savings for this session
    file: commands/cf-stats.md
